<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign in</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      width: 360px;
      border: 1px solid #dadce0;
      border-radius: 10px;
      text-align: center;
    }

    .title {
      font-size: 22px;
      margin-bottom: 20px;
      color: #202124;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
    }

    input:focus {
      border: 1px solid #1a73e8;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #1558b0;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #5f6368;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">Sign in</div>

    <input type="text" placeholder="Email or phone">
    <input type="password" placeholder="Password">

    <button>Next</button>

    <div class="footer">
      Secure login demo page
    </div>
  </div>

</body>
</html>
